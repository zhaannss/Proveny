version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: syllab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: syllab
      POSTGRES_PASSWORD: syllab_password
      POSTGRES_DB: syllab_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syllab -d syllab_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: syllab_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
